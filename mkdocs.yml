site_name: MinusFrameWork
site_description: Framework Delphi completo — ORM, Migrator, Mensageria, Feature Flags, Telemetria e IA
site_author: Gabriel Ferreira Mendes
site_url: https://gabrielferreiramendes.github.io/minusframework
repo_url: https://github.com/GabrielFerreiraMendes/minusframework
repo_name: GabrielFerreiraMendes/minusframework
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/GabrielFerreiraMendes/minusframework
      name: GitHub
    - icon: fontawesome/brands/discord
      link: https://discord.gg/minusframework
      name: Discord
  generator: false

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html
  - def_list

nav:
  - Início: index.md
  - Quick Start: getting-started.md
  - Guias:
    - ORM:
      - Visão Geral: orm/index.md
      - CRUD Básico: orm/crud.md
      - Mapeamento de Entidades: orm/entities.md
      - Criteria API: orm/criteria.md
      - Unit of Work: orm/unit-of-work.md
      - Providers: orm/providers.md
    - CLI:
      - Visão Geral: cli/index.md
      - Comandos: cli/commands.md
      - make:entity: cli/make-entity.md
      - new api: cli/new-api.md
    - Migrator:
      - Visão Geral: migrator/index.md
      - CLI Reference: migrator/cli.md
      - DLL Reference: migrator/dll.md
    - Mensageria:
      - Visão Geral: messaging/index.md
      - Configuração: messaging/config.md
      - Sagas: messaging/sagas.md
    - Extensões:
      - Visão Geral: extensions/index.md
      - Soft Delete: extensions/soft-delete.md
      - Auditoria: extensions/audit.md
      - Cache: extensions/cache.md
    - Feature Flags: modules/FeatureFlags/index.md
    - Telemetria: telemetry/index.md
    - MinusAI:
      - Visão Geral: ai/index.md
      - MCP Server: ai/mcp-server.md
      - Ferramentas: ai/tools.md
  - Planos: pricing.md
  - Licenciamento: licensing.md
  - Sobre: about.md

extra_css:
  - assets/custom.css

copyright: "&copy; 2026 MinusFrameWork &middot; Free (MIT) · Pro · Enterprise"
