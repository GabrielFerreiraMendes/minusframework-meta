<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Quadrado com borda -->
  <rect x="10" y="10" width="100" height="100" rx="16" fill="none" stroke="url(#g)" stroke-width="6"/>

  <!-- Sinal de menos no centro -->
  <rect x="35" y="52" width="50" height="16" rx="8" fill="url(#g)"/>

  <!-- Palavra "minus" ao lado -->
  <text x="135" y="89" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="700" fill="#1e293b">minus</text>
</svg>
